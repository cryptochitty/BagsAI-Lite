<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BagsAI Lite</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
      --green: #3fb950; --yellow: #d29922; --red: #f85149; --purple: #bc8cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .logo h1 { font-size: 20px; font-weight: 700; }
    .logo span.accent { color: var(--accent); }
    .badge { background: var(--accent); color: #0d1117; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
    header a { color: var(--muted); font-size: 14px; text-decoration: none; margin-left: 20px; }
    header a:hover { color: var(--accent); }
    main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
    .stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 700; }
    .stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .tab { padding: 10px 20px; font-size: 14px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }
    .panel { display: none; }
    .panel.active { display: block; }
    .source { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
    .source span { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #0d1117; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px; text-align: left; font-weight: 600; }
    td { padding: 12px 16px; border-top: 1px solid var(--border); }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .tier { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
    .tier-S { background: rgba(188,140,255,0.15); color: var(--purple); }
    .tier-A { background: rgba(63,185,80,0.15); color: var(--green); }
    .tier-B { background: rgba(88,166,255,0.15); color: var(--accent); }
    .tier-C { background: rgba(139,148,158,0.15); color: var(--muted); }
    .score-wrap { display: flex; align-items: center; gap: 8px; }
    .score-bar { width: 60px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 2px; }
    .loading { text-align: center; padding: 60px; color: var(--muted); }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { text-align: center; padding: 40px; color: var(--red); }
  </style>
</head>
<body>
<header>
  <div class="logo">
    <h1>Bags<span class="accent">AI</span> Lite<span class="badge">v1.0</span></h1>
  </div>
  <div>
    <a href="/docs">API Docs</a>
    <a href="/redoc">ReDoc</a>
  </div>
</header>
<main>
  <div class="stats">
    <div class="stat-card"><div class="label">Tokens Tracked</div><div class="value" id="stat-total">—</div><div class="sub">from Bags API</div></div>
    <div class="stat-card"><div class="label">S-Tier Tokens</div><div class="value" id="stat-s">—</div><div class="sub">top performers</div></div>
    <div class="stat-card"><div class="label">Hidden Gems</div><div class="value" id="stat-gems">—</div><div class="sub">undervalued picks</div></div>
    <div class="stat-card"><div class="label">Avg Score</div><div class="value" id="stat-avg">—</div><div class="sub">composite 0–100</div></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('tokens',this)">Trending Tokens</div>
    <div class="tab" onclick="switchTab('gems',this)">Hidden Gems</div>
  </div>
  <div id="panel-tokens" class="panel active">
    <div id="tokens-source" class="source"></div>
    <div id="tokens-content" class="loading"><div class="spinner"></div><br>Loading tokens…</div>
  </div>
  <div id="panel-gems" class="panel">
    <div id="gems-source" class="source"></div>
    <div id="gems-content" class="loading"><div class="spinner"></div><br>Loading gems…</div>
  </div>
</main>
<script>
const BASE = '/api/v1';

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function scoreColor(s) {
  if (s >= 75) return '#3fb950';
  if (s >= 50) return '#58a6ff';
  if (s >= 25) return '#d29922';
  return '#8b949e';
}

function fmt(n, d=2) {
  if (n == null) return '—';
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toFixed(d);
}

function tokenTable(tokens) {
  if (!tokens.length) return '<div class="loading">No tokens found.</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>#</th><th>Token</th><th>Price</th><th>Vol 24h</th><th>Score</th><th>Tier</th><th>Rec</th><th></th></tr></thead>
    <tbody>${tokens.map((t,i) => `<tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td><strong>${t.name}</strong><br><span style="color:var(--muted);font-size:12px">$${t.symbol}</span></td>
      <td>$${t.price_usd != null ? t.price_usd.toFixed(6) : '—'}</td>
      <td>$${fmt(t.volume_24h)}</td>
      <td><div class="score-wrap"><span>${t.composite_score != null ? t.composite_score.toFixed(1) : '—'}</span>
        <div class="score-bar"><div class="score-fill" style="width:${t.composite_score||0}%;background:${scoreColor(t.composite_score)}"></div></div></div></td>
      <td><span class="tier tier-${t.tier}">${t.tier}</span></td>
      <td style="color:${t.recommendation==='BUY'?'var(--green)':t.recommendation==='AVOID'?'var(--red)':'var(--muted)'};font-size:12px">${t.recommendation||'—'}</td>
      <td>${t.hidden_gem ? '💎' : ''}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function toArray(d) {
  return Array.isArray(d) ? d : (d.tokens || d.gems || []);
}

async function loadTokens() {
  try {
    const d = await fetch(`${BASE}/analyze?limit=50`).then(r => r.json());
    const tokens = toArray(d);
    document.getElementById('stat-total').textContent = tokens.length;
    document.getElementById('stat-s').textContent = tokens.filter(t => t.tier==='S').length;
    document.getElementById('stat-gems').textContent = tokens.filter(t => t.hidden_gem).length;
    const scores = tokens.filter(t => t.composite_score != null && t.composite_score > 0).map(t => t.composite_score);
    document.getElementById('stat-avg').textContent = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : '—';
    document.getElementById('tokens-source').innerHTML = `<span>scored & ranked · ${tokens.length} tokens</span>`;
    document.getElementById('tokens-content').innerHTML = tokenTable(tokens);
  } catch(e) {
    document.getElementById('tokens-content').innerHTML = `<div class="error-msg">Failed to load: ${e.message}</div>`;
  }
}

async function loadGems() {
  try {
    const d = await fetch(`${BASE}/analyze/gems?limit=10`).then(r => r.json());
    const tokens = toArray(d);
    document.getElementById('gems-source').innerHTML = `<span>hidden gem analysis · ${tokens.length} results</span>`;
    document.getElementById('gems-content').innerHTML = tokenTable(tokens);
  } catch(e) {
    document.getElementById('gems-content').innerHTML = `<div class="error-msg">Failed to load: ${e.message}</div>`;
  }
}

loadTokens();
loadGems();
</script>
</body>
</html>
